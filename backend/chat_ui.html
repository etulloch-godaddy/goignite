<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoCass Q&A Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 480px;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      height: 620px;
    }

    .chat-header {
      background: #1a73e8;
      color: #fff;
      padding: 18px 20px;
      border-radius: 16px 16px 0 0;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header .dot {
      width: 10px;
      height: 10px;
      background: #4cff91;
      border-radius: 50%;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      align-self: flex-start;
      background: #f1f3f4;
      color: #202124;
      border-bottom-left-radius: 4px;
    }

    .message.typing {
      align-self: flex-start;
      background: #f1f3f4;
      color: #888;
      border-bottom-left-radius: 4px;
      font-style: italic;
    }

    .input-row {
      display: flex;
      padding: 14px 16px;
      border-top: 1px solid #e8eaed;
      gap: 10px;
    }

    .input-row input {
      flex: 1;
      border: 1px solid #dadce0;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #1a73e8; }

    .input-row button {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #1558b0; }
    .input-row button:disabled { background: #a8c7fa; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <span class="dot"></span>
    GoCass Q&A Bot
  </div>
  <div class="messages" id="messages">
    <div class="message bot">Hi! I'm the GoCass Q&A bot. Ask me anything.</div>
  </div>
  <div class="input-row">
    <input id="input" type="text" placeholder="Type a message…" autocomplete="off" />
    <button id="send">Send</button>
  </div>
</div>

<script>
  const API = 'http://localhost:8000/api/chat';
  const sessionId = crypto.randomUUID();

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  function addMessage(text, role) {
    const el = document.createElement('div');
    el.className = `message ${role}`;
    el.textContent = text;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    sendBtn.disabled = true;
    addMessage(text, 'user');

    const typingEl = addMessage('Typing…', 'typing');

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();
      typingEl.remove();
      addMessage(data.reply, 'bot');
    } catch (err) {
      typingEl.remove();
      addMessage(`Error: ${err.message}`, 'bot');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
